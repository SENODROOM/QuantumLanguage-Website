<script>
// ══════════════════════════════════════════════════════════════════
//  QUANTUM LANGUAGE INTERPRETER v2 — Complete rewrite, all bugs fixed
// ══════════════════════════════════════════════════════════════════

// ─── LEXER ───────────────────────────────────────────────────────
const KEYWORDS = new Set([
  'let','const','fn','def','function','class','extends','new','this','self',
  'super','return','if','else','elif','while','for','in','of','break','continue',
  'raise','throw','try','except','catch','finally','as','print','printf','input',
  'scanf','cout','cin','import','from','true','True','false','False','nil','null',
  'undefined','None','and','or','not','is','int','float','double','char','string',
  'bool','void','long','short','unsigned','scan','payload','encrypt','decrypt',
  'hash','lambda','static','endl','pass'
]);
const TYPE_KW = new Set(['int','float','double','char','string','bool','void','long','short','unsigned']);

// Map raw keyword strings to token types
function kwType(id) {
  switch(id) {
    case 'fn': case 'def': case 'function': return 'FN';
    case 'self': case 'this': return 'THIS';
    case 'print': case 'printf': return 'PRINT';
    case 'input': case 'scanf': return 'INPUT';
    case 'cout': return 'COUT';
    case 'cin': return 'CIN';
    case 'throw': return 'RAISE';
    case 'catch': return 'EXCEPT';
    case 'true': case 'True': return 'BOOL_TRUE';
    case 'false': case 'False': return 'BOOL_FALSE';
    case 'nil': case 'null': case 'undefined': case 'None': return 'NIL';
    case 'and': return 'AND';
    case 'or': return 'OR';
    case 'not': return 'NOT';
    case 'lambda': return 'LAMBDA';
    case 'static': return 'STATIC';
    case 'pass': return 'PASS';
    default: return id.toUpperCase();
  }
}

function tokenize(src) {
  const tokens = [];
  let pos = 0, line = 1, col = 1;

  const cur  = () => pos < src.length ? src[pos] : '\0';
  const look = (n=1) => pos+n < src.length ? src[pos+n] : '\0';
  const adv  = () => {
    const c = src[pos++];
    if (c === '\n') { line++; col = 1; } else col++;
    return c;
  };
  const tok = (type, val) => tokens.push({type, val, line, col});

  while (pos < src.length) {
    // skip spaces/tabs/CR
    while (pos < src.length && (cur()===' '||cur()==='\t'||cur()==='\r')) adv();
    if (pos >= src.length) break;

    const sl = line, sc = col;
    const c = adv();
    const mkTok = (type, val) => tokens.push({type, val, line:sl, col:sc});

    if (c === '\n') { mkTok('NEWLINE','\n'); continue; }

    // comments
    if (c==='#') { while (pos<src.length && cur()!=='\n') adv(); continue; }
    if (c==='/' && cur()==='/') { while (pos<src.length && cur()!=='\n') adv(); continue; }
    if (c==='/' && cur()==='*') {
      adv();
      while (pos<src.length) {
        if (cur()==='*' && look()==='/') { adv(); adv(); break; }
        adv();
      }
      continue;
    }

    // strings
    if (c==='"' || c==="'") {
      let s='', q=c;
      while (pos<src.length && cur()!==q) {
        if (cur()==='\\') {
          adv();
          const e=adv();
          if (e==='n') s+='\n';
          else if (e==='t') s+='\t';
          else if (e==='r') s+='\r';
          else s+=e;
        } else s+=adv();
      }
      if (pos<src.length) adv(); // closing quote
      mkTok('STRING', s); continue;
    }

    // template literals
    if (c==='`') {
      const parts=[];
      let seg='';
      while (pos<src.length && cur()!=='`') {
        if (cur()==='\\') { adv(); seg+=adv(); }
        else if (cur()==='$' && look()==='{') {
          parts.push({isExpr:false, val:seg}); seg='';
          adv(); adv(); // skip $  {
          let expr='', depth=1;
          while (pos<src.length && depth>0) {
            if (cur()==='{') depth++;
            else if (cur()==='}') { if (--depth===0) { adv(); break; } }
            expr+=adv();
          }
          parts.push({isExpr:true, val:expr});
        } else seg+=adv();
      }
      if (pos<src.length) adv(); // closing `
      parts.push({isExpr:false, val:seg});
      mkTok('TEMPLATE', null); tokens[tokens.length-1].parts = parts; continue;
    }

    // numbers
    if (/[0-9]/.test(c) || (c==='.' && /[0-9]/.test(cur()))) {
      let n=c;
      if (c==='0' && (cur()==='x'||cur()==='X')) {
        n+=adv(); while (/[0-9a-fA-F]/.test(cur())) n+=adv();
      } else {
        let hasDot = c==='.';
        while (pos<src.length && (/[0-9]/.test(cur()) || (!hasDot && cur()==='.'))) {
          if (cur()==='.') hasDot=true;
          n+=adv();
        }
      }
      mkTok('NUMBER', n); continue;
    }

    // identifiers / keywords
    if (/[a-zA-Z_$]/.test(c)) {
      let id=c;
      while (pos<src.length && /[a-zA-Z0-9_$]/.test(cur())) id+=adv();
      const type = KEYWORDS.has(id) ? kwType(id) : 'IDENT';
      mkTok(type, id); continue;
    }

    // multi-char operators (check longest first)
    const two = c + cur();
    const three = two + look(2);

    if (three==='===') { adv(); adv(); mkTok('EQEQ','==='); continue; }
    if (three==='!==') { adv(); adv(); mkTok('NEQ','!=='); continue; }
    if (two==='==') { adv(); mkTok('EQEQ','=='); continue; }
    if (two==='!=') { adv(); mkTok('NEQ','!='); continue; }
    if (two==='<=') { adv(); mkTok('LEQ','<='); continue; }
    if (two==='>=') { adv(); mkTok('GEQ','>='); continue; }
    if (two==='&&') { adv(); mkTok('AND','&&'); continue; }
    if (two==='||') { adv(); mkTok('OR','||'); continue; }
    if (two==='**') { adv(); mkTok('POW','**'); continue; }
    if (two==='//') { while(pos<src.length&&cur()!=='\n')adv(); continue; }
    if (two==='+=') { adv(); mkTok('PLUS_EQ','+='); continue; }
    if (two==='-=') { adv(); mkTok('MINUS_EQ','-='); continue; }
    if (two==='*=') { adv(); mkTok('STAR_EQ','*='); continue; }
    if (two==='/=') { adv(); mkTok('SLASH_EQ','/='); continue; }
    if (two==='%=') { adv(); mkTok('MOD_EQ','%='); continue; }
    if (two==='++') { adv(); mkTok('PLUS_PLUS','++'); continue; }
    if (two==='--') { adv(); mkTok('MINUS_MINUS','--'); continue; }
    if (two==='->') { adv(); mkTok('ARROW_OP','->'); continue; }
    if (two==='<<') { adv(); mkTok('LSHIFT','<<'); continue; }
    if (two==='>>') { adv(); mkTok('RSHIFT','>>'); continue; }
    if (two==='??') { adv(); mkTok('NULL_COAL','??'); continue; }
    if (two==='?.') { adv(); mkTok('DOT','.'); continue; }
    if (two==='=>') { adv(); mkTok('FAT_ARROW','=>'); continue; }

    // single chars
    const singles = {
      '=':'EQ','+':'PLUS','-':'MINUS','*':'STAR','/':'SLASH','%':'PERCENT',
      '<':'LT','>':'GT','!':'BANG','(':'LPAREN',')':'RPAREN','{':'LBRACE',
      '}':'RBRACE','[':'LBRACKET',']':'RBRACKET',',':'COMMA',';':'SEMI',
      ':':'COLON','.':'DOT','&':'AMP','|':'PIPE','^':'CARET','~':'TILDE',
      '?':'QUESTION','@':'AT'
    };
    if (singles[c]) { mkTok(singles[c], c); continue; }
    // unknown char — skip silently
  }
  tokens.push({type:'EOF', val:'', line, col});
  return injectIndentDedent(tokens, src);
}

function injectIndentDedent(raw, src) {
  // Compute leading indent (spaces) for each line
  const lineIndent = {};
  let li=1, indent=0, atStart=true;
  for (let i=0;i<src.length;i++) {
    const c=src[i];
    if (c==='\n') { lineIndent[li]=indent; li++; indent=0; atStart=true; }
    else if (atStart) {
      if (c===' ') indent++;
      else if (c==='\t') indent+=4;
      else atStart=false;
    }
  }
  lineIndent[li]=indent;

  const out=[];
  const stack=[0];
  let braceDepth=0, parenDepth=0;

  for (let i=0; i<raw.length; i++) {
    const tok=raw[i];

    // track bracket depth
    if (tok.type==='LBRACE'||tok.type==='LBRACKET'||tok.type==='LPAREN') {
      braceDepth++;
      if (tok.type!=='LBRACE') parenDepth++;
    } else if (tok.type==='RBRACE'||tok.type==='RBRACKET'||tok.type==='RPAREN') {
      braceDepth=Math.max(0,braceDepth-1);
      if (tok.type!=='RBRACE') parenDepth=Math.max(0,parenDepth-1);
    }

    // Drop NEWLINEs inside () and []
    if (tok.type==='NEWLINE' && parenDepth>0) continue;

    // COLON at statement level → maybe open a Python block
    if (tok.type==='COLON' && braceDepth===0) {
      let j=i+1;
      while (j<raw.length && raw[j].type==='NEWLINE') j++;
      if (j<raw.length && raw[j].type!=='EOF') {
        const ni = lineIndent[raw[j].line] || 0;
        if (ni > stack[stack.length-1]) {
          out.push(tok);
          for (let k=i+1; k<j; k++) out.push(raw[k]);
          i=j-1;
          stack.push(ni);
          out.push({type:'INDENT',val:'INDENT',line:tok.line,col:tok.col});
          continue;
        }
      }
      out.push(tok);
      continue;
    }

    // NEWLINE at statement level → maybe emit DEDENTs
    if (tok.type==='NEWLINE' && braceDepth===0) {
      out.push(tok);
      let j=i+1;
      while (j<raw.length && raw[j].type==='NEWLINE') j++;
      if (j<raw.length && raw[j].type!=='EOF') {
        const ni = lineIndent[raw[j].line] || 0;
        while (stack.length>1 && ni < stack[stack.length-1]) {
          stack.pop();
          out.push({type:'DEDENT',val:'DEDENT',line:tok.line,col:tok.col});
        }
      } else {
        while (stack.length>1) {
          stack.pop();
          out.push({type:'DEDENT',val:'DEDENT',line:tok.line,col:tok.col});
        }
      }
      continue;
    }
    out.push(tok);
  }
  return out;
}

// ─── PARSER ──────────────────────────────────────────────────────
class Parser {
  constructor(tokens) { this.tokens=tokens; this.pos=0; }
  cur()       { return this.tokens[this.pos]   || {type:'EOF',val:''}; }
  peek(n=1)   { return this.tokens[this.pos+n] || {type:'EOF',val:''}; }
  adv()       { const t=this.cur(); this.pos++; return t; }
  eat(type)   {
    if (this.cur().type!==type)
      throw new QError(`SyntaxError: expected ${type}, got '${this.cur().val}' (${this.cur().type}) at line ${this.cur().line}`);
    return this.adv();
  }
  check(...tt) { return tt.includes(this.cur().type); }
  skipNL()   { while (this.check('NEWLINE','SEMI')) this.adv(); }

  parse() {
    const stmts=[];
    this.skipNL();
    while (!this.check('EOF')) { stmts.push(this.parseStmt()); this.skipNL(); }
    return {type:'Program', stmts};
  }

  // Parse a block: either { ... } or INDENT...DEDENT or a single statement
  parseBlock() {
    this.skipNL();
    if (this.check('LBRACE')) {
      this.adv();
      this.skipNL();
      const stmts=[];
      while (!this.check('RBRACE','EOF')) { stmts.push(this.parseStmt()); this.skipNL(); }
      if (this.check('RBRACE')) this.adv();
      return {type:'Block', stmts};
    }
    if (this.check('INDENT')) {
      this.adv();
      this.skipNL();
      const stmts=[];
      while (!this.check('DEDENT','EOF')) { stmts.push(this.parseStmt()); this.skipNL(); }
      if (this.check('DEDENT')) this.adv();
      return {type:'Block', stmts};
    }
    // single statement (inline block after colon)
    return {type:'Block', stmts:[this.parseStmt()]};
  }

  parseStmt() {
    this.skipNL();
    const t=this.cur();

    if (t.type==='PASS')     { this.adv(); return {type:'Pass'}; }
    if (t.type==='RETURN')   return this.parseReturn();
    if (t.type==='IF')       return this.parseIf();
    if (t.type==='WHILE')    return this.parseWhile();
    if (t.type==='FOR')      return this.parseFor();
    if (t.type==='CLASS')    return this.parseClass();
    if (t.type==='BREAK')    { this.adv(); return {type:'Break'}; }
    if (t.type==='CONTINUE') { this.adv(); return {type:'Continue'}; }
    if (t.type==='RAISE')    return this.parseRaise();
    if (t.type==='TRY')      return this.parseTry();
    if (t.type==='IMPORT'||t.type==='FROM') return this.parseImport();
    if (t.type==='STATIC')   return this.parseStaticDecl();
    if (t.type==='PRINT')    return this.parsePrint();

    // fn / def / function keyword
    if (t.type==='FN') return this.parseFnDecl();

    // let / const declaration
    if (t.type==='LET'||t.type==='CONST') return this.parseVarDecl();

    // C++ type-hint: `int x = ...` or `string name = ...`
    if (TYPE_KW.has(t.val) && t.type!=='IDENT') {
      const nextT = this.peek();
      if (nextT.type==='IDENT' || nextT.type==='AMP') {
        this.adv(); // discard type keyword
        if (this.check('AMP')) this.adv(); // discard & ref
        // Now we expect an identifier followed by optional assignment
        return this.parseExprStmt();
      }
    }

    return this.parseExprStmt();
  }

  parsePrint() {
    this.adv(); // eat print/printf
    const args=[];
    if (this.check('LPAREN')) {
      this.adv();
      if (!this.check('RPAREN')) {
        args.push(this.parseExpr());
        while (this.check('COMMA')) { this.adv(); if (!this.check('RPAREN')) args.push(this.parseExpr()); }
      }
      if (this.check('RPAREN')) this.adv();
    } else {
      // bare print without parens
      if (!this.check('NEWLINE','SEMI','EOF','RBRACE','DEDENT')) {
        args.push(this.parseExpr());
        while (this.check('COMMA')) { this.adv(); args.push(this.parseExpr()); }
      }
    }
    return {type:'Print', args};
  }

  parseReturn() {
    this.adv();
    if (this.check('NEWLINE','SEMI','RBRACE','DEDENT','EOF'))
      return {type:'Return', value:null};
    return {type:'Return', value:this.parseExpr()};
  }

  parseIf() {
    this.adv(); // eat if
    if (this.check('LPAREN')) this.adv();
    const cond = this.parseExpr();
    if (this.check('RPAREN')) this.adv();
    if (this.check('COLON'))  this.adv();
    const then = this.parseBlock();
    const elifs=[];
    let elseB=null;
    this.skipNL();
    while (this.check('ELIF','ELSE')) {
      if (this.cur().type==='ELIF') {
        this.adv();
        if (this.check('LPAREN')) this.adv();
        const ec=this.parseExpr();
        if (this.check('RPAREN')) this.adv();
        if (this.check('COLON'))  this.adv();
        elifs.push({cond:ec, body:this.parseBlock()});
        this.skipNL();
      } else {
        this.adv();
        if (this.check('COLON')) this.adv();
        elseB=this.parseBlock();
        break;
      }
    }
    return {type:'If', cond, then, elifs, else:elseB};
  }

  parseWhile() {
    this.adv();
    if (this.check('LPAREN')) this.adv();
    const cond=this.parseExpr();
    if (this.check('RPAREN')) this.adv();
    if (this.check('COLON'))  this.adv();
    const body=this.parseBlock();
    return {type:'While', cond, body};
  }

  parseFor() {
    this.adv(); // eat for
    const hasParen=this.check('LPAREN');
    if (hasParen) this.adv();
    const vars=[];
    // collect loop variable(s)
    if (this.check('IDENT','THIS')) { vars.push(this.cur().val); this.adv(); }
    while (this.check('COMMA')) {
      this.adv();
      if (this.check('IDENT','THIS')) { vars.push(this.cur().val); this.adv(); }
    }
    // eat 'in' or 'of'
    if (this.check('IN','OF')) this.adv();
    const iter=this.parseExpr();
    if (hasParen && this.check('RPAREN')) this.adv();
    if (this.check('COLON')) this.adv();
    const body=this.parseBlock();
    return {type:'For', vars, iter, body};
  }

  // Parses fn/def/function declarations at statement level
  parseFnDecl() {
    this.adv(); // eat fn/def/function
    let name=null;
    if (this.check('IDENT')) { name=this.cur().val; this.adv(); }
    // Optional param list — parens are OPTIONAL in Quantum
    const {params, defaults, paramRefs} = this.parseParamList();
    if (this.check('COLON')) this.adv();
    const body=this.parseBlock();
    return {type:'FnDecl', name, params, defaults, paramRefs, body, isStatic:false};
  }

  parseParamList() {
    const params=[], defaults={}, paramRefs={};
    if (!this.check('LPAREN')) return {params, defaults, paramRefs};
    this.adv(); // (
    while (!this.check('RPAREN','EOF')) {
      // skip type hints like `int`, `string`, etc.
      if (TYPE_KW.has(this.cur().val) && this.cur().type!=='IDENT') {
        this.adv();
        if (this.check('AMP')) this.adv(); // & ref
      }
      if (this.check('AMP')) { this.adv(); } // bare & ref
      if (!this.check('IDENT','THIS')) { if(this.check('COMMA'))this.adv(); continue; }
      const pname=this.cur().val; this.adv();
      params.push(pname);
      if (this.check('EQ')) { this.adv(); defaults[pname]=this.parseExpr(); }
      if (this.check('COMMA')) this.adv();
    }
    if (this.check('RPAREN')) this.adv();
    return {params, defaults, paramRefs};
  }

  parseClass() {
    this.adv(); // eat class
    const name=this.cur().val; this.adv();
    let base=null;
    if (this.check('EXTENDS')) { this.adv(); base=this.cur().val; this.adv(); }
    if (this.check('COLON')) this.adv();
    const body=this.parseBlock();
    return {type:'ClassDecl', name, base, body};
  }

  parseVarDecl() {
    const isConst=this.cur().type==='CONST'; this.adv();
    if (!this.check('IDENT')) return {type:'Pass'}; // guard
    const name=this.cur().val; this.adv();
    let init=null;
    if (this.check('EQ')) { this.adv(); init=this.parseExpr(); }
    // skip optional semicolon
    if (this.check('SEMI')) this.adv();
    return {type:'VarDecl', name, isConst, init};
  }

  parseRaise() {
    this.adv();
    const val=this.parseExpr();
    return {type:'Raise', val};
  }

  parseTry() {
    this.adv(); // eat try
    if (this.check('COLON')) this.adv();
    const tryBody=this.parseBlock();
    let catchVar=null, catchBody=null, finallyBody=null;
    this.skipNL();
    if (this.check('EXCEPT')) {
      this.adv();
      if (this.check('LPAREN')) this.adv();
      // patterns: `except:` / `except as e:` / `except SomeType as e:` / `except SomeType e:`
      if (this.check('IDENT')) {
        const first=this.cur().val; this.adv();
        if (this.check('AS')) { this.adv(); catchVar=this.cur().val; this.adv(); }
        else if (this.check('IDENT')) { catchVar=this.cur().val; this.adv(); }
        else catchVar=first;
      }
      if (this.check('AS')) { this.adv(); catchVar=this.cur().val; this.adv(); }
      if (this.check('RPAREN')) this.adv();
      if (this.check('COLON'))  this.adv();
      catchBody=this.parseBlock();
    }
    this.skipNL();
    if (this.check('FINALLY')) {
      this.adv();
      if (this.check('COLON')) this.adv();
      finallyBody=this.parseBlock();
    }
    return {type:'Try', tryBody, catchVar, catchBody, finallyBody};
  }

  parseImport() {
    while (!this.check('NEWLINE','EOF')) this.adv();
    return {type:'Pass'};
  }

  parseStaticDecl() {
    this.adv(); // skip 'static'
    const stmt=this.parseStmt();
    if (stmt.type==='FnDecl') stmt.isStatic=true;
    return stmt;
  }

  parseExprStmt() {
    const expr=this.parseExpr();
    if (this.check('SEMI')) this.adv();
    return {type:'ExprStmt', expr};
  }

  // ── Expressions ─────────────────────────────────────────────────
  parseExpr()   { return this.parseTernary(); }

  parseTernary() {
    let left=this.parseAssign();
    if (this.check('QUESTION')) {
      this.adv();
      const then=this.parseExpr();
      this.eat('COLON');
      const else_=this.parseExpr();
      return {type:'Ternary', cond:left, then, else:else_};
    }
    // Python inline: `x if cond else y`  (after value, check for IF)
    // handled as a special form here
    return left;
  }

  parseAssign() {
    let left=this.parseNullCoal();
    const ops={'EQ':'=','PLUS_EQ':'+=','MINUS_EQ':'-=','STAR_EQ':'*=','SLASH_EQ':'/=','MOD_EQ':'%='};
    if (ops[this.cur().type]) {
      const op=ops[this.cur().type]; this.adv();
      const right=this.parseExpr();
      return {type:'Assign', op, left, right};
    }
    return left;
  }

  parseNullCoal() {
    let l=this.parseOr();
    while (this.check('NULL_COAL')) { this.adv(); l={type:'Binary',op:'??',left:l,right:this.parseOr()}; }
    return l;
  }

  parseOr() {
    let l=this.parseAnd();
    while (this.check('OR')) { this.adv(); l={type:'Binary',op:'||',left:l,right:this.parseAnd()}; }
    return l;
  }

  parseAnd() {
    let l=this.parseNot();
    while (this.check('AND')) { this.adv(); l={type:'Binary',op:'&&',left:l,right:this.parseNot()}; }
    return l;
  }

  parseNot() {
    if (this.check('NOT','BANG')) { this.adv(); return {type:'Unary',op:'!',operand:this.parseNot()}; }
    return this.parseCompare();
  }

  parseCompare() {
    let l=this.parseBitor();
    const ops={'EQEQ':'==','NEQ':'!=','LT':'<','GT':'>','LEQ':'<=','GEQ':'>='};
    while (ops[this.cur().type]) {
      const op=ops[this.cur().type]; this.adv();
      l={type:'Binary',op,left:l,right:this.parseBitor()};
    }
    if (this.check('IN')) { this.adv(); return {type:'Binary',op:'in',left:l,right:this.parseBitor()}; }
    if (this.check('IS')) { this.adv(); return {type:'Binary',op:'==',left:l,right:this.parseBitor()}; }
    return l;
  }

  parseBitor()  { let l=this.parseBitxor(); while(this.check('PIPE')){this.adv();l={type:'Binary',op:'|',left:l,right:this.parseBitxor()};}return l; }
  parseBitxor() { let l=this.parseBitand(); while(this.check('CARET')){this.adv();l={type:'Binary',op:'^',left:l,right:this.parseBitand()};}return l; }
  parseBitand() {
    let l=this.parseShift();
    // & is also address-of prefix — only treat as binary if left side is complete expr
    while (this.check('AMP') && !this._atUnaryPos()) { this.adv(); l={type:'Binary',op:'&',left:l,right:this.parseShift()}; }
    return l;
  }
  _atUnaryPos() { return false; } // address-of is handled in parseUnary

  parseShift() {
    let l=this.parseAdd();
    while (this.check('LSHIFT','RSHIFT')) { const op=this.cur().val; this.adv(); l={type:'Binary',op,left:l,right:this.parseAdd()}; }
    return l;
  }

  parseAdd() {
    let l=this.parseMul();
    while (this.check('PLUS','MINUS')) { const op=this.cur().val; this.adv(); l={type:'Binary',op,left:l,right:this.parseMul()}; }
    return l;
  }

  parseMul() {
    let l=this.parsePow();
    while (this.check('STAR','SLASH','PERCENT')) { const op=this.cur().val; this.adv(); l={type:'Binary',op,left:l,right:this.parsePow()}; }
    return l;
  }

  parsePow() {
    let l=this.parseUnary();
    if (this.check('POW')) { this.adv(); return {type:'Binary',op:'**',left:l,right:this.parsePow()}; }
    return l;
  }

  parseUnary() {
    if (this.check('MINUS'))  { this.adv(); return {type:'Unary',op:'-',operand:this.parseUnary()}; }
    if (this.check('TILDE'))  { this.adv(); return {type:'Unary',op:'~',operand:this.parseUnary()}; }
    if (this.check('AMP'))    { this.adv(); return {type:'AddrOf',operand:this.parseUnary()}; }
    if (this.check('STAR'))   { this.adv(); return {type:'Deref',operand:this.parseUnary()}; }
    return this.parsePostfix();
  }

  parsePostfix() {
    let expr=this.parsePrimary();
    while (true) {
      if (this.check('DOT')) {
        this.adv();
        const name=this.cur().val; this.adv();
        if (this.check('LPAREN')) {
          expr={type:'MethodCall',obj:expr,name,args:this.parseArgs()};
        } else {
          expr={type:'Member',obj:expr,name};
        }
      } else if (this.check('ARROW_OP')) {
        this.adv(); const name=this.cur().val; this.adv();
        expr={type:'Arrow',obj:expr,name};
      } else if (this.check('LBRACKET')) {
        this.adv();
        let start=null, stop=null, step=null, isSlice=false;
        if (!this.check('COLON')) start=this.parseExpr();
        if (this.check('COLON')) {
          isSlice=true; this.adv();
          if (!this.check('RBRACKET','COLON')) stop=this.parseExpr();
          if (this.check('COLON')) { this.adv(); if (!this.check('RBRACKET')) step=this.parseExpr(); }
        }
        this.eat('RBRACKET');
        expr = isSlice ? {type:'Slice',obj:expr,start,stop,step} : {type:'Index',obj:expr,index:start};
      } else if (this.check('LPAREN')) {
        expr={type:'Call',callee:expr,args:this.parseArgs()};
      } else if (this.check('PLUS_PLUS')) {
        this.adv(); expr={type:'PostIncDec',op:'++',operand:expr};
      } else if (this.check('MINUS_MINUS')) {
        this.adv(); expr={type:'PostIncDec',op:'--',operand:expr};
      } else break;
    }
    return expr;
  }

  parseArgs() {
    this.eat('LPAREN');
    const args=[];
    if (!this.check('RPAREN')) {
      args.push(this.parseExpr());
      while (this.check('COMMA')) { this.adv(); if (!this.check('RPAREN')) args.push(this.parseExpr()); }
    }
    if (this.check('RPAREN')) this.adv();
    return args;
  }

  parsePrimary() {
    const t=this.cur();

    if (t.type==='NUMBER')     { this.adv(); return {type:'Num',val:t.val.startsWith('0x')||t.val.startsWith('0X')?parseInt(t.val,16):parseFloat(t.val)}; }
    if (t.type==='STRING')     { this.adv(); return {type:'Str',val:t.val}; }
    if (t.type==='BOOL_TRUE')  { this.adv(); return {type:'Bool',val:true}; }
    if (t.type==='BOOL_FALSE') { this.adv(); return {type:'Bool',val:false}; }
    if (t.type==='NIL')        { this.adv(); return {type:'Nil'}; }
    if (t.type==='TEMPLATE')   { this.adv(); return {type:'Template',parts:t.parts}; }

    // Identifiers and keywords used as values
    if (t.type==='IDENT'||t.type==='THIS') {
      this.adv();
      if (this.check('FAT_ARROW')) {
        this.adv();
        return {type:'Lambda',params:[t.val],body:this.parseExpr()};
      }
      return {type:'Ident',name:t.val};
    }

    // Parenthesised expression or arrow function (x,y) => ...
    if (t.type==='LPAREN') {
      this.adv();
      // Try to parse as arrow params
      const savedPos=this.pos;
      try {
        const params=[];
        if (!this.check('RPAREN')) {
          if (this.check('IDENT','THIS')) { params.push(this.cur().val); this.adv(); }
          while (this.check('COMMA') && (this.peek().type==='IDENT'||this.peek().type==='THIS')) {
            this.adv(); params.push(this.cur().val); this.adv();
          }
        }
        if (this.check('RPAREN') && this.peek().type==='FAT_ARROW') {
          this.adv(); this.adv(); // ) =>
          return {type:'Lambda',params,body:this.parseExpr()};
        }
        this.pos=savedPos;
      } catch(e) { this.pos=savedPos; }
      const expr=this.parseExpr();
      if (this.check('RPAREN')) this.adv();
      return expr;
    }

    // Array literal or list comprehension
    if (t.type==='LBRACKET') {
      this.adv();
      if (this.check('RBRACKET')) { this.adv(); return {type:'Array',items:[]}; }
      const first=this.parseExpr();
      if (this.check('FOR')) {
        this.adv();
        const vars=[];
        if (this.check('IDENT','THIS')) { vars.push(this.cur().val); this.adv(); }
        while (this.check('COMMA')) { this.adv(); if(this.check('IDENT','THIS')){vars.push(this.cur().val);this.adv();} }
        this.eat('IN');
        const iter=this.parseExpr();
        let cond=null;
        if (this.check('IF')) { this.adv(); cond=this.parseExpr(); }
        this.eat('RBRACKET');
        return {type:'ListComp',expr:first,vars,iter,cond};
      }
      const items=[first];
      while (this.check('COMMA')) { this.adv(); if (!this.check('RBRACKET')) items.push(this.parseExpr()); }
      this.eat('RBRACKET');
      return {type:'Array',items};
    }

    // Dict literal
    if (t.type==='LBRACE') {
      this.adv();
      const pairs=[];
      while (!this.check('RBRACE','EOF')) {
        this.skipNL();
        if (this.check('RBRACE')) break;
        let key;
        if (this.check('STRING')) { key={type:'Str',val:this.cur().val}; this.adv(); }
        else if (this.check('IDENT')) { key={type:'Str',val:this.cur().val}; this.adv(); }
        else if (this.check('NUMBER')) { key={type:'Str',val:this.cur().val}; this.adv(); }
        else break;
        this.eat('COLON');
        const val=this.parseExpr();
        pairs.push({key,val});
        if (this.check('COMMA')) this.adv();
        this.skipNL();
      }
      this.eat('RBRACE');
      return {type:'Dict',pairs};
    }

    // Lambda keyword
    if (t.type==='LAMBDA') {
      this.adv();
      const params=[];
      if (!this.check('COLON')) {
        if (this.check('IDENT')) { params.push(this.cur().val); this.adv(); }
        while (this.check('COMMA')) { this.adv(); if(this.check('IDENT')){params.push(this.cur().val);this.adv();} }
      }
      this.eat('COLON');
      return {type:'Lambda',params,body:this.parseExpr()};
    }

    // Inline fn expression (anonymous)
    if (t.type==='FN') {
      this.adv();
      let name=null;
      if (this.check('IDENT')) { name=this.cur().val; this.adv(); }
      const {params,defaults,paramRefs}=this.parseParamList();
      if (this.check('COLON')) this.adv();
      const body=this.parseBlock();
      return {type:'FnDecl',name,params,defaults,paramRefs,body,isStatic:false};
    }

    // cout << chain
    if (t.type==='COUT') {
      this.adv();
      const args=[];
      while (this.check('LSHIFT')) {
        this.adv();
        if (this.check('IDENT') && this.cur().val==='endl') { this.adv(); break; }
        args.push(this.parseExpr());
      }
      return {type:'CoutExpr',args};
    }

    // input / scanf
    if (t.type==='INPUT') {
      this.adv();
      let prompt=null;
      if (this.check('LPAREN')) {
        this.adv();
        if (!this.check('RPAREN')) prompt=this.parseExpr();
        if (this.check('RPAREN')) this.adv();
      }
      return {type:'InputExpr',prompt};
    }

    // new T(args)
    if (t.type==='NEW') {
      this.adv();
      const cls=this.cur().val; this.adv();
      return {type:'New',cls,args:this.check('LPAREN')?this.parseArgs():[]};
    }

    // super(args)
    if (t.val==='super') {
      this.adv();
      return {type:'Super',args:this.check('LPAREN')?this.parseArgs():[]};
    }

    // Anything else — silently skip and return nil
    this.adv();
    return {type:'Nil'};
  }
}

// ─── INTERPRETER ─────────────────────────────────────────────────
class QError extends Error {
  constructor(msg) { super(msg); this.name='QuantumError'; }
}
class ReturnSignal  { constructor(v) { this.value=v; } }
class BreakSignal    {}
class ContinueSignal {}

class Environment {
  constructor(parent=null) {
    this.vars=new Map();
    this.consts=new Set();
    this.parent=parent;
  }
  define(name, val, isConst=false) {
    this.vars.set(name, val);
    if (isConst) this.consts.add(name);
  }
  get(name) {
    if (this.vars.has(name)) return this.vars.get(name);
    if (this.parent) return this.parent.get(name);
    throw new QError(`NameError: '${name}' is not defined`);
  }
  set(name, val) {
    if (this.vars.has(name)) {
      if (this.consts.has(name)) throw new QError(`RuntimeError: Cannot reassign constant '${name}'`);
      this.vars.set(name, val); return;
    }
    if (this.parent) { this.parent.set(name, val); return; }
    this.vars.set(name, val); // auto-define at global level
  }
  has(name) { return this.vars.has(name) || (this.parent ? this.parent.has(name) : false); }
}

class Interpreter {
  constructor(outputFn, inputFn) {
    this.output  = outputFn;
    this.inputFn = inputFn;
    this.globals = new Environment();
    this.env     = this.globals;
    this.steps   = 0;
    this.MAX_STEPS = 2_000_000;
    this.registerNatives();
  }

  step() {
    if (++this.steps > this.MAX_STEPS)
      throw new QError('RuntimeError: Step limit exceeded — infinite loop?');
  }

  // ── Natives ────────────────────────────────────────────────────
  registerNatives() {
    const def = (name, fn) => this.globals.define(name, {_native:true, name, fn});

    def('len', a => {
      const v=a[0];
      if (typeof v==='string') return v.length;
      if (Array.isArray(v)) return v.length;
      if (v&&v._dict) return Object.keys(v._dict).length;
      throw new QError('TypeError: len() requires string, array, or dict');
    });
    def('range', a => {
      let start=0, stop, step=1;
      if (a.length===1) stop=a[0];
      else if (a.length===2) { start=a[0]; stop=a[1]; }
      else { start=a[0]; stop=a[1]; step=a[2]; }
      const r=[];
      if (step>0) { for(let i=start;i<stop;i+=step) r.push(i); }
      else        { for(let i=start;i>stop;i+=step) r.push(i); }
      return r;
    });
    def('type', a => {
      const v=a[0];
      if (v===null||v===undefined) return 'nil';
      if (typeof v==='boolean') return 'bool';
      if (typeof v==='number')  return 'number';
      if (typeof v==='string')  return 'string';
      if (Array.isArray(v))     return 'array';
      if (v&&v._dict)  return 'dict';
      if (v&&v._fn)    return 'function';
      if (v&&v._native) return 'native';
      if (v&&v._inst)  return 'instance';
      if (v&&v._class_obj) return 'class';
      return 'object';
    });
    def('str',   a => this.valToStr(a[0]));
    def('int',   a => {
      const v=a[0];
      if (typeof v==='number') return Math.trunc(v);
      if (typeof v==='boolean') return v?1:0;
      if (typeof v==='string') { const n=parseInt(v); if(isNaN(n)) throw new QError('ValueError: invalid int'); return n; }
      throw new QError('TypeError: cannot convert to int');
    });
    def('float', a => {
      const v=a[0];
      if (typeof v==='number') return v;
      if (typeof v==='string') { const n=parseFloat(v); if(isNaN(n)) throw new QError('ValueError: invalid float'); return n; }
      throw new QError('TypeError');
    });
    def('bool',    a => this.isTruthy(a[0]));
    def('abs',     a => Math.abs(a[0]));
    def('sqrt',    a => Math.sqrt(a[0]));
    def('floor',   a => Math.floor(a[0]));
    def('ceil',    a => Math.ceil(a[0]));
    def('round',   a => a.length>1 ? parseFloat(a[0].toFixed(a[1])) : Math.round(a[0]));
    def('pow',     a => Math.pow(a[0],a[1]));
    def('max',     a => a.length===1&&Array.isArray(a[0]) ? Math.max(...a[0]) : Math.max(...a));
    def('min',     a => a.length===1&&Array.isArray(a[0]) ? Math.min(...a[0]) : Math.min(...a));
    def('sum',     a => { const arr=a[0]; if(!Array.isArray(arr)) throw new QError('TypeError: sum requires array'); return arr.reduce((s,v)=>s+(typeof v==='number'?v:0),0); });
    def('random',  () => Math.random());
    def('randint', a => Math.floor(Math.random()*(a[1]-a[0]+1))+a[0]);
    def('print',   a => { this.output(a.map(v=>this.valToStr(v)).join(' '),'stdout'); return null; });
    def('println', a => { this.output(a.map(v=>this.valToStr(v)).join(' '),'stdout'); return null; });
    def('chr',     a => String.fromCharCode(a[0]));
    def('ord',     a => String(a[0]).charCodeAt(0));
    def('hex',     a => '0x'+Math.trunc(a[0]).toString(16));
    def('bin',     a => '0b'+Math.trunc(a[0]).toString(2));
    def('oct',     a => '0o'+Math.trunc(a[0]).toString(8));
    def('sorted',  a => { const arr=[...a[0]]; arr.sort((x,y)=>x<y?-1:x>y?1:0); return arr; });
    def('reversed',a => [...a[0]].reverse());
    def('enumerate',a=>{ const arr=a[0]; return arr.map((v,i)=>[i,v]); });
    def('zip',     a => {
      const len=Math.min(...a.map(x=>x.length)); const r=[];
      for(let i=0;i<len;i++) r.push(a.map(x=>x[i]));
      return r;
    });
    def('map',    a => { const [fn,arr]=a; return arr.map(v=>this.callValueSync(fn,[v])); });
    def('filter', a => { const [fn,arr]=a; return arr.filter(v=>this.isTruthy(this.callValueSync(fn,[v]))); });
    def('isinstance', a => {
      const [v,t]=a;
      if (typeof t==='string') {
        if (t==='number'||t==='int'||t==='float') return typeof v==='number';
        if (t==='string'||t==='str') return typeof v==='string';
        if (t==='bool') return typeof v==='boolean';
        if (t==='array'||t==='list') return Array.isArray(v);
        if (t==='dict') return !!(v&&v._dict);
        if (t==='nil'||t==='null') return v===null||v===undefined;
      }
      return false;
    });
    def('rot13', a => String(a[0]).replace(/[a-zA-Z]/g, c => {
      const b=c<='Z'?65:97;
      return String.fromCharCode(((c.charCodeAt(0)-b+13)%26)+b);
    }));
    def('xor_bytes', a => {
      const [s,key]=a;
      return String(s).split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^String(key).charCodeAt(i%String(key).length))).join('');
    });
    def('to_hex', a => Array.from(String(a[0])).map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join(''));
    def('input', async a => {
      const prompt=a.length?this.valToStr(a[0]):'';
      return await this.inputFn(prompt);
    });

    // math object
    const mathObj = {
      _mathObj:true,
      pi: Math.PI, e: Math.E, inf: Infinity,
      sqrt: {_native:true,name:'sqrt', fn:a=>Math.sqrt(a[0])},
      floor:{_native:true,name:'floor',fn:a=>Math.floor(a[0])},
      ceil: {_native:true,name:'ceil', fn:a=>Math.ceil(a[0])},
      abs:  {_native:true,name:'abs',  fn:a=>Math.abs(a[0])},
      log:  {_native:true,name:'log',  fn:a=>a.length>1?Math.log(a[0])/Math.log(a[1]):Math.log(a[0])},
      log2: {_native:true,name:'log2', fn:a=>Math.log2(a[0])},
      log10:{_native:true,name:'log10',fn:a=>Math.log10(a[0])},
      sin:  {_native:true,name:'sin',  fn:a=>Math.sin(a[0])},
      cos:  {_native:true,name:'cos',  fn:a=>Math.cos(a[0])},
      tan:  {_native:true,name:'tan',  fn:a=>Math.tan(a[0])},
      pow:  {_native:true,name:'pow',  fn:a=>Math.pow(a[0],a[1])},
      round:{_native:true,name:'round',fn:a=>Math.round(a[0])},
    };
    this.globals.define('math', mathObj);

    // console object
    const consoleObj = {
      log:  {_native:true,name:'log',  fn:a=>{this.output(a.map(v=>this.valToStr(v)).join(' '),'stdout');return null;}},
      error:{_native:true,name:'error',fn:a=>{this.output(a.map(v=>this.valToStr(v)).join(' '),'stderr');return null;}},
      warn: {_native:true,name:'warn', fn:a=>{this.output(a.map(v=>this.valToStr(v)).join(' '),'warn');return null;}},
    };
    this.globals.define('console', consoleObj);
  }

  // ── Value helpers ──────────────────────────────────────────────
  isTruthy(v) {
    if (v===null||v===undefined||v===false) return false;
    if (typeof v==='number') return v!==0 && !isNaN(v);
    if (typeof v==='string') return v.length>0;
    if (Array.isArray(v)) return true; // empty array is still truthy in Quantum
    return true;
  }

  valToStr(v) {
    if (v===null||v===undefined) return 'nil';
    if (typeof v==='boolean') return v?'true':'false';
    if (typeof v==='number') {
      if (!isFinite(v)) return String(v);
      // Show integers without decimal point
      if (v===Math.trunc(v) && Math.abs(v)<1e15) return String(Math.trunc(v));
      return String(v);
    }
    if (typeof v==='string') return v;
    if (Array.isArray(v)) return '['+v.map(x=>this.valToRepr(x)).join(', ')+']';
    if (v&&v._dict) return '{'+Object.entries(v._dict).map(([k,val])=>JSON.stringify(k)+': '+this.valToRepr(val)).join(', ')+'}';
    if (v&&v._inst) {
      const sm=this.findMethod(v._class,'__str__');
      if (sm) { try { return this.callFnSync(sm,[],v); } catch(e){} }
      return `<${v._class?v._class.name:'?'} instance>`;
    }
    if (v&&v._class_obj) return `<class '${v.name}'>`;
    if (v&&v._fn)     return `<function ${v.name||'lambda'}>`;
    if (v&&v._native) return `<native ${v.name}>`;
    if (v&&v._ptr)    return v._addr;
    return String(v);
  }

  valToRepr(v) {
    if (typeof v==='string') return '"'+v.replace(/\\/g,'\\\\').replace(/"/g,'\\"')+'"';
    return this.valToStr(v);
  }

  // ── Execution ──────────────────────────────────────────────────
  async execNode(node) {
    if (!node) return;
    this.step();
    switch (node.type) {
      case 'Program':
      case 'Block':
        for (const s of node.stmts) await this.execNode(s);
        break;
      case 'Pass': break;
      case 'Print': {
        const vals=[];
        for (const a of node.args) vals.push(await this.evalNode(a));
        this.output(vals.map(v=>this.valToStr(v)).join(' '),'stdout');
        break;
      }
      case 'ExprStmt': await this.evalNode(node.expr); break;
      case 'VarDecl': {
        const val = node.init ? await this.evalNode(node.init) : null;
        this.env.define(node.name, val, node.isConst);
        break;
      }
      case 'FnDecl': {
        if (!node.name) break;
        const fn = {_fn:true, name:node.name, params:node.params||[], defaults:node.defaults||{},
                    paramRefs:node.paramRefs||{}, body:node.body, closure:this.env, isStatic:node.isStatic||false};
        this.env.define(node.name, fn);
        break;
      }
      case 'ClassDecl': await this.execClass(node); break;
      case 'If':        await this.execIf(node); break;
      case 'While':     await this.execWhile(node); break;
      case 'For':       await this.execFor(node); break;
      case 'Return': {
        const v = node.value ? await this.evalNode(node.value) : null;
        throw new ReturnSignal(v);
      }
      case 'Break':    throw new BreakSignal();
      case 'Continue': throw new ContinueSignal();
      case 'Raise': {
        const v = await this.evalNode(node.val);
        throw new QError(this.valToStr(v));
      }
      case 'Try': await this.execTry(node); break;
      default: break;
    }
  }

  async execClass(node) {
    let base=null;
    if (node.base) { try { base=this.env.get(node.base); } catch(e){} }
    const klass = {
      _class_obj:true, _class:true, name:node.name,
      base: base&&base._class_obj ? base : null,
      methods:{}, staticMethods:{}, staticFields:{}
    };
    // Process body — collect method declarations
    const bodyStmts = node.body?.stmts || [];
    for (const stmt of bodyStmts) {
      if (stmt.type==='FnDecl' && stmt.name) {
        const fn = {_fn:true, name:stmt.name, params:stmt.params||[], defaults:stmt.defaults||{},
                    paramRefs:stmt.paramRefs||{}, body:stmt.body, closure:this.env};
        if (stmt.isStatic) klass.staticMethods[stmt.name]=fn;
        else klass.methods[stmt.name]=fn;
      }
      // class-level variable → static field
      if (stmt.type==='ExprStmt'&&stmt.expr.type==='Assign') {
        const name=stmt.expr.left?.name;
        if (name) klass.staticFields[name]=null; // evaluated at instantiation time
      }
    }
    this.env.define(node.name, klass);
  }

  async execIf(node) {
    if (this.isTruthy(await this.evalNode(node.cond))) {
      await this.execBlockInScope(node.then);
    } else {
      for (const elif of node.elifs||[]) {
        if (this.isTruthy(await this.evalNode(elif.cond))) {
          await this.execBlockInScope(elif.body); return;
        }
      }
      if (node.else) await this.execBlockInScope(node.else);
    }
  }

  async execWhile(node) {
    let safety=0;
    while (this.isTruthy(await this.evalNode(node.cond))) {
      this.step();
      if (++safety > 500000) throw new QError('RuntimeError: Infinite loop (while)');
      try { await this.execBlockInScope(node.body); }
      catch(e) {
        if (e instanceof BreakSignal)    break;
        if (e instanceof ContinueSignal) continue;
        throw e;
      }
    }
  }

  async execFor(node) {
    const iterVal = await this.evalNode(node.iter);
    let items;
    if (Array.isArray(iterVal)) items=iterVal;
    else if (iterVal&&iterVal._dict) items=Object.entries(iterVal._dict).map(([k,v])=>[k,v]);
    else if (typeof iterVal==='string') items=[...iterVal];
    else items=[];

    for (const item of items) {
      this.step();
      const env=new Environment(this.env);
      if (node.vars.length===1) {
        env.define(node.vars[0], item);
      } else if (node.vars.length>=2 && Array.isArray(item)) {
        for (let i=0; i<node.vars.length; i++) env.define(node.vars[i], item[i]??null);
      } else {
        env.define(node.vars[0], item);
      }
      const prev=this.env; this.env=env;
      try { await this.execNode(node.body); }
      catch(e) { this.env=prev; if(e instanceof BreakSignal)break; if(e instanceof ContinueSignal)continue; throw e; }
      this.env=prev;
    }
  }

  async execTry(node) {
    try { await this.execBlockInScope(node.tryBody); }
    catch(e) {
      if (e instanceof ReturnSignal||e instanceof BreakSignal||e instanceof ContinueSignal) throw e;
      if (node.catchBody) {
        const env=new Environment(this.env);
        if (node.catchVar) env.define(node.catchVar, e.message||String(e));
        const prev=this.env; this.env=env;
        try { await this.execNode(node.catchBody); } finally { this.env=prev; }
      }
    } finally {
      if (node.finallyBody) await this.execBlockInScope(node.finallyBody);
    }
  }

  // Execute a Block node in a fresh child environment
  async execBlockInScope(block) {
    const env=new Environment(this.env);
    const prev=this.env; this.env=env;
    try { await this.execNode(block); }
    finally { this.env=prev; }
  }

  // ── Evaluation ─────────────────────────────────────────────────
  async evalNode(node) {
    if (!node) return null;
    this.step();
    switch (node.type) {
      case 'Num':      return node.val;
      case 'Str':      return node.val;
      case 'Bool':     return node.val;
      case 'Nil':      return null;
      case 'Template': return await this.evalTemplate(node);
      case 'Ident':    return this.evalIdent(node.name);
      case 'Array':    { const items=[]; for(const i of node.items) items.push(await this.evalNode(i)); return items; }
      case 'Dict':     return await this.evalDict(node);
      case 'Binary':   return await this.evalBinary(node);
      case 'Unary':    return await this.evalUnary(node);
      case 'Assign':   return await this.evalAssign(node);
      case 'Ternary':  return this.isTruthy(await this.evalNode(node.cond)) ? await this.evalNode(node.then) : await this.evalNode(node.else);
      case 'Call':     return await this.evalCall(node);
      case 'MethodCall': return await this.evalMethodCall(node);
      case 'Member':   return await this.evalMember(node);
      case 'Index':    return await this.evalIndex(node);
      case 'Slice':    return await this.evalSlice(node);
      case 'ListComp': return await this.evalListComp(node);
      case 'Lambda':   return {_fn:true,name:'lambda',params:node.params||[],defaults:{},paramRefs:{},body:node.body,closure:this.env,_isExpr:true};
      case 'FnDecl':   return {_fn:true,name:node.name||'lambda',params:node.params||[],defaults:node.defaults||{},paramRefs:node.paramRefs||{},body:node.body,closure:this.env,_isExpr:true};
      case 'PostIncDec': return await this.evalPostIncDec(node);
      case 'AddrOf':   return await this.evalAddrOf(node);
      case 'Deref':    return await this.evalDeref(node);
      case 'Arrow':    return await this.evalArrow(node);
      case 'New':      return await this.evalNew(node);
      case 'Super':    return await this.evalSuper(node);
      case 'CoutExpr': {
        const parts=[];
        for (const a of node.args) parts.push(await this.evalNode(a));
        this.output(parts.map(p=>this.valToStr(p)).join(''),'stdout');
        return null;
      }
      case 'InputExpr': {
        const prompt=node.prompt?this.valToStr(await this.evalNode(node.prompt)):'';
        return await this.inputFn(prompt);
      }
      default: return null;
    }
  }

  evalIdent(name) {
    // built-in constants
    if (name==='endl')  return '\n';
    if (name==='PI'||name==='M_PI') return Math.PI;
    if (name==='Infinity'||name==='inf') return Infinity;
    if (name==='NaN') return NaN;
    try { return this.env.get(name); }
    catch(e) { throw new QError(e.message); }
  }

  async evalTemplate(node) {
    let result='';
    for (const part of node.parts) {
      if (!part.isExpr) { result+=part.val; continue; }
      const subTokens=tokenize(part.val);
      const ast=new Parser(subTokens).parse();
      let val=null;
      for (const s of ast.stmts) { if(s.type==='ExprStmt') val=await this.evalNode(s.expr); }
      result+=this.valToStr(val);
    }
    return result;
  }

  async evalDict(node) {
    const d={_dict:{}};
    for (const {key,val} of node.pairs) {
      const k=await this.evalNode(key);
      const v=await this.evalNode(val);
      d._dict[String(k)]=v;
    }
    return d;
  }

  async evalBinary(node) {
    const op=node.op;
    // Short-circuit
    if (op==='&&') { const l=await this.evalNode(node.left); return this.isTruthy(l) ? await this.evalNode(node.right) : l; }
    if (op==='||') { const l=await this.evalNode(node.left); return this.isTruthy(l) ? l : await this.evalNode(node.right); }
    if (op==='??') { const l=await this.evalNode(node.left); return (l===null||l===undefined) ? await this.evalNode(node.right) : l; }

    const l=await this.evalNode(node.left);
    const r=await this.evalNode(node.right);
    switch (op) {
      case '+':
        if (typeof l==='string'||typeof r==='string') return this.valToStr(l)+this.valToStr(r);
        if (Array.isArray(l)&&Array.isArray(r)) return [...l,...r];
        return (l??0)+(r??0);
      case '-':  return (l??0)-(r??0);
      case '*':
        if (typeof l==='string'&&typeof r==='number') return l.repeat(Math.max(0,r));
        if (Array.isArray(l)&&typeof r==='number') { const a=[]; for(let i=0;i<r;i++) a.push(...l); return a; }
        return (l??0)*(r??0);
      case '/':  if (r===0) throw new QError('RuntimeError: Division by zero'); return l/r;
      case '%':  return ((l%r)+r)%r; // Python-style modulo
      case '**': return Math.pow(l,r);
      case '//': return Math.floor(l/r);
      case '==': return l===r||(l==null&&r==null);
      case '!=': return !(l===r||(l==null&&r==null));
      case '<':  return l<r;
      case '>':  return l>r;
      case '<=': return l<=r;
      case '>=': return l>=r;
      case '&':  return (l|0)&(r|0);
      case '|':  return (l|0)|(r|0);
      case '^':  return (l|0)^(r|0);
      case '<<': return (l|0)<<(r|0);
      case '>>': return (l|0)>>(r|0);
      case 'in':
        if (Array.isArray(r)) return r.some(x=>x===l||(x==null&&l==null));
        if (r&&r._dict) return String(l) in r._dict;
        if (typeof r==='string'&&typeof l==='string') return r.includes(l);
        return false;
      default: return null;
    }
  }

  async evalUnary(node) {
    const v=await this.evalNode(node.operand);
    switch (node.op) {
      case '-': return -(v??0);
      case '!': return !this.isTruthy(v);
      case '~': return ~((v??0)|0);
    }
    return v;
  }

  async evalAssign(node) {
    const val=await this.evalNode(node.right);
    await this.setLValue(node.left, val, node.op);
    return val;
  }

  applyOp(op, cur, val) {
    switch (op) {
      case '+=': return (typeof cur==='string'||typeof val==='string') ? this.valToStr(cur)+this.valToStr(val) : (cur??0)+(val??0);
      case '-=': return (cur??0)-(val??0);
      case '*=': return (cur??0)*(val??0);
      case '/=': return (cur??0)/(val??0);
      case '%=': return (cur??0)%(val??0);
      default:   return val;
    }
  }

  async setLValue(target, val, op) {
    if (target.type==='Ident') {
      const name=target.name;
      if (op==='=') {
        if (this.env.has(name)) this.env.set(name,val);
        else this.env.define(name,val);
      } else {
        const cur=this.env.has(name)?this.env.get(name):0;
        const newVal=this.applyOp(op,cur,val);
        if (this.env.has(name)) this.env.set(name,newVal);
        else this.env.define(name,newVal);
      }
    } else if (target.type==='Index') {
      const obj=await this.evalNode(target.obj);
      const idx=await this.evalNode(target.index);
      if (Array.isArray(obj)) {
        const i=typeof idx==='number'?(idx<0?obj.length+idx:idx):parseInt(idx);
        obj[i]=op==='='?val:this.applyOp(op,obj[i],val);
      } else if (obj&&obj._dict) {
        const k=String(idx);
        obj._dict[k]=op==='='?val:this.applyOp(op,obj._dict[k]??null,val);
      }
    } else if (target.type==='Member') {
      const obj=await this.evalNode(target.obj);
      const name=target.name;
      if (obj&&obj._inst) {
        obj._inst[name]=op==='='?val:this.applyOp(op,obj._inst[name]??null,val);
      } else if (obj&&typeof obj==='object') {
        obj[name]=op==='='?val:this.applyOp(op,obj[name]??null,val);
      }
    } else if (target.type==='Deref') {
      const ptr=await this.evalNode(target.operand);
      if (ptr&&ptr._ptr) { ptr._cell.val=op==='='?val:this.applyOp(op,ptr._cell.val,val); }
      else throw new QError('RuntimeError: Cannot dereference non-pointer');
    }
  }

  async evalCall(node) {
    // Handle math.pi / math.e as property access
    const callee=await this.evalNode(node.callee);
    const args=[];
    for (const a of node.args) args.push(await this.evalNode(a));
    return await this.callValue(callee, args);
  }

  async callValue(callee, args) {
    if (callee===null||callee===undefined) throw new QError('TypeError: Cannot call nil');
    if (callee._native) return await callee.fn(args);
    if (callee._fn)     return await this.callFn(callee, args);
    if (callee._class_obj||callee._class) return await this.instantiate(callee, args);
    throw new QError(`TypeError: '${this.valToStr(callee)}' is not callable`);
  }

  // Sync version for use in native functions (map, filter, etc.)
  callValueSync(callee, args) {
    if (callee._native) return callee.fn(args);
    if (callee._fn)     return this.callFnSync(callee, args);
    throw new QError(`TypeError: not callable`);
  }

  callFnSync(fn, args, thisVal=null) {
    // Synchronous call — for __str__ and map/filter
    const env=new Environment(fn.closure||this.globals);
    if (thisVal) { env.define('self',thisVal); env.define('this',thisVal); }
    for (let i=0; i<(fn.params||[]).length; i++) {
      const pname=fn.params[i];
      env.define(pname, i<args.length?args[i]:null);
    }
    // For lambda expressions with direct body expression:
    if (fn._isExpr && fn.body && fn.body.type!=='Block' && fn.body.type!=='Program') {
      const prev=this.env; this.env=env;
      try {
        // Evaluate synchronously using a simplistic eval (no async)
        const result=this._evalSync(fn.body);
        this.env=prev; return result;
      } catch(e) { this.env=prev; if(e instanceof ReturnSignal) return e.value; throw e; }
    }
    return null; // async fns return null synchronously
  }

  _evalSync(node) {
    if (!node) return null;
    switch (node.type) {
      case 'Num':  return node.val;
      case 'Str':  return node.val;
      case 'Bool': return node.val;
      case 'Nil':  return null;
      case 'Ident': return this.evalIdent(node.name);
      case 'Binary': {
        const l=this._evalSync(node.left), r=this._evalSync(node.right);
        switch(node.op){
          case '+': return (typeof l==='string'||typeof r==='string')?String(l)+String(r):(l??0)+(r??0);
          case '-': return (l??0)-(r??0); case '*': return (l??0)*(r??0);
          case '/': return (l??0)/(r??0); case '%': return (l??0)%(r??0);
          case '**': return Math.pow(l,r); case '==': return l===r;
          case '!=': return l!==r; case '<': return l<r; case '>': return l>r;
          case '<=': return l<=r; case '>=': return l>=r;
        }
        return null;
      }
      case 'Unary': {
        const v=this._evalSync(node.operand);
        if(node.op==='-') return -(v??0);
        if(node.op==='!') return !v;
        return v;
      }
      default: return null;
    }
  }

  async callFn(fn, args, thisVal=null) {
    const env=new Environment(fn.closure||this.globals);
    if (thisVal) { env.define('self',thisVal); env.define('this',thisVal); }
    const params=fn.params||[];
    for (let i=0; i<params.length; i++) {
      const pname=params[i];
      let val=i<args.length?args[i]:null;
      if (val===null && fn.defaults && fn.defaults[pname]!==undefined) {
        const prev=this.env; this.env=env;
        try { val=await this.evalNode(fn.defaults[pname]); } finally { this.env=prev; }
      }
      env.define(pname, val);
    }
    const prev=this.env; this.env=env;
    try {
      if (fn._isExpr) { const r=await this.evalNode(fn.body); this.env=prev; return r; }
      await this.execNode(fn.body);
      this.env=prev; return null;
    } catch(e) {
      this.env=prev;
      if (e instanceof ReturnSignal) return e.value;
      throw e;
    }
  }

  findMethod(klass, name) {
    if (!klass) return null;
    if (klass.methods&&klass.methods[name]) return klass.methods[name];
    if (klass.base) return this.findMethod(klass.base, name);
    return null;
  }

  async instantiate(klass, args) {
    const inst={_inst:true, _class:klass};
    const initFn=this.findMethod(klass,'init')||this.findMethod(klass,'__init__');
    if (initFn) await this.callFn(initFn, args, inst);
    return inst;
  }

  async evalMethodCall(node) {
    const obj=await this.evalNode(node.obj);
    const name=node.name;
    const args=[];
    for (const a of node.args) args.push(await this.evalNode(a));

    if (obj===null||obj===undefined) throw new QError(`AttributeError: Cannot call method '${name}' on nil`);

    if (obj._inst) {
      // Check instance fields first (stored callable)
      if (name in obj._inst && obj._inst[name]!==null && obj._inst[name]!==undefined) {
        const field=obj._inst[name];
        if (field._fn||field._native) return await this.callValue(field, args);
      }
      const method=this.findMethod(obj._class, name);
      if (method) return await this.callFn(method, args, obj);
      throw new QError(`AttributeError: '${obj._class?.name||'?'}' has no method '${name}'`);
    }

    if (obj._class_obj) {
      const sm=obj.staticMethods&&obj.staticMethods[name];
      if (sm) return await this.callFn(sm, args);
      throw new QError(`AttributeError: class '${obj.name}' has no static method '${name}'`);
    }

    if (typeof obj==='string') return this.callStringMethod(obj, name, args);
    if (Array.isArray(obj))    return this.callArrayMethod(obj, name, args);
    if (obj&&obj._dict)        return this.callDictMethod(obj, name, args);

    // Generic object (like math module)
    if (obj&&typeof obj==='object') {
      if (name in obj) {
        const v=obj[name];
        if (v&&v._native) return v.fn(args);
        if (typeof v==='function') return v(args);
        return v; // property
      }
    }
    throw new QError(`TypeError: Cannot call method '${name}' on ${typeof obj}`);
  }

  callStringMethod(s, name, args) {
    switch (name) {
      case 'upper':      return s.toUpperCase();
      case 'lower':      return s.toLowerCase();
      case 'strip': case 'trim': return s.trim();
      case 'lstrip':     return s.trimStart();
      case 'rstrip':     return s.trimEnd();
      case 'split':      return args[0]!==undefined&&args[0]!==null ? s.split(String(args[0])) : s.split('');
      case 'join':       return Array.isArray(args[0]) ? args[0].map(v=>this.valToStr(v)).join(s) : s;
      case 'replace':    return s.split(String(args[0])).join(String(args[1]));
      case 'contains': case 'includes': return s.includes(String(args[0]));
      case 'startswith': case 'startsWith': return s.startsWith(String(args[0]));
      case 'endswith': case 'endsWith':   return s.endsWith(String(args[0]));
      case 'find': case 'index': case 'indexOf': return s.indexOf(String(args[0]));
      case 'rfind': case 'lastIndexOf':  return s.lastIndexOf(String(args[0]));
      case 'count':      return s.split(String(args[0])).length-1;
      case 'substr': case 'substring': return s.substring(args[0]||0, args[1]!==undefined?(args[0]||0)+(args[1]):undefined);
      case 'slice':      return s.slice(args[0],args[1]);
      case 'len': case 'length': return s.length;
      case 'isdigit':    return /^\d+$/.test(s);
      case 'isalpha':    return /^[a-zA-Z]+$/.test(s);
      case 'isalnum':    return /^[a-zA-Z0-9]+$/.test(s);
      case 'isspace':    return /^\s+$/.test(s);
      case 'isupper':    return s===s.toUpperCase()&&s!==s.toLowerCase();
      case 'islower':    return s===s.toLowerCase()&&s!==s.toUpperCase();
      case 'format': {
        let r=s;
        args.forEach((v,i)=>{ r=r.replace('{}',this.valToStr(v)).replace('{'+i+'}',this.valToStr(v)); });
        return r;
      }
      case 'zfill':    return s.padStart(args[0]||0,'0');
      case 'ljust':    return s.padEnd(args[0]||0,args[1]||' ');
      case 'rjust':    return s.padStart(args[0]||0,args[1]||' ');
      case 'center': { const w=args[0]||0,p=args[1]||' ',pad=Math.max(0,w-s.length); return p.repeat(Math.floor(pad/2))+s+p.repeat(Math.ceil(pad/2)); }
      case 'title':    return s.replace(/\w\S*/g,t=>t[0].toUpperCase()+t.slice(1).toLowerCase());
      case 'capitalize': return s[0].toUpperCase()+s.slice(1).toLowerCase();
      case 'rot13':    return s.replace(/[a-zA-Z]/g,c=>{const b=c<='Z'?65:97;return String.fromCharCode(((c.charCodeAt(0)-b+13)%26)+b);});
      case 'encode': case 'decode': return s;
      case 'to_hex': return Array.from(s).map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join('');
      case 'split_lines': case 'splitlines': return s.split('\n');
      default: throw new QError(`AttributeError: string has no method '${name}'`);
    }
  }

  callArrayMethod(arr, name, args) {
    switch (name) {
      case 'append': case 'push':  arr.push(args[0]); return null;
      case 'pop':    return arr.pop()??null;
      case 'shift':  return arr.shift()??null;
      case 'unshift': case 'prepend': arr.unshift(args[0]); return null;
      case 'insert': arr.splice(args[0],0,args[1]); return null;
      case 'remove': { const i=arr.indexOf(args[0]); if(i>=0)arr.splice(i,1); return null; }
      case 'sort':   arr.sort((a,b)=>typeof a==='number'&&typeof b==='number'?a-b:String(a)<String(b)?-1:String(a)>String(b)?1:0); return null;
      case 'reverse': arr.reverse(); return null;
      case 'contains': case 'includes': return arr.some(v=>v===args[0]||(v==null&&args[0]==null));
      case 'len': case 'length': return arr.length;
      case 'indexOf': case 'find': return arr.findIndex(v=>v===args[0]);
      case 'join':   return arr.map(v=>this.valToStr(v)).join(args[0]!==undefined?String(args[0]):'');
      case 'slice':  return arr.slice(args[0],args[1]);
      case 'concat': case 'extend': { const other=args[0]; if(Array.isArray(other))arr.push(...other); return null; }
      case 'copy':   return [...arr];
      case 'clear':  arr.splice(0,arr.length); return null;
      case 'sum':    return arr.reduce((s,v)=>s+(typeof v==='number'?v:0),0);
      case 'min':    return Math.min(...arr.filter(v=>typeof v==='number'));
      case 'max':    return Math.max(...arr.filter(v=>typeof v==='number'));
      case 'count':  return arr.filter(v=>v===args[0]).length;
      case 'index':  return arr.indexOf(args[0]);
      case 'map':    return arr.map(v=>this.callValueSync(args[0],[v]));
      case 'filter': return arr.filter(v=>this.isTruthy(this.callValueSync(args[0],[v])));
      default: throw new QError(`AttributeError: array has no method '${name}'`);
    }
  }

  callDictMethod(d, name, args) {
    switch (name) {
      case 'keys':    return Object.keys(d._dict);
      case 'values':  return Object.values(d._dict);
      case 'items':   return Object.entries(d._dict).map(([k,v])=>[k,v]);
      case 'get':     return d._dict[String(args[0])]??args[1]??null;
      case 'has': case 'contains': return String(args[0]) in d._dict;
      case 'delete': case 'remove': case 'pop': { delete d._dict[String(args[0])]; return null; }
      case 'len': case 'length': return Object.keys(d._dict).length;
      case 'update':  if(args[0]&&args[0]._dict) Object.assign(d._dict,args[0]._dict); return null;
      case 'copy':    return {_dict:{...d._dict}};
      case 'clear':   for(const k in d._dict) delete d._dict[k]; return null;
      default: throw new QError(`AttributeError: dict has no method '${name}'`);
    }
  }

  async evalMember(node) {
    const obj=await this.evalNode(node.obj);
    const name=node.name;
    if (obj===null||obj===undefined) throw new QError(`AttributeError: Cannot access '${name}' on nil`);
    if (obj._inst) {
      if (name in obj._inst) return obj._inst[name];
      const m=this.findMethod(obj._class,name);
      if (m) return {_fn:true,...m,_boundTo:obj};
      return null; // graceful
    }
    if (obj._class_obj) {
      if (obj.staticMethods&&name in obj.staticMethods) return obj.staticMethods[name];
      if (obj.staticFields&&name in obj.staticFields)  return obj.staticFields[name];
      return obj[name]??null;
    }
    if (typeof obj==='string' && (name==='length'||name==='len')) return obj.length;
    if (Array.isArray(obj) && (name==='length'||name==='len')) return obj.length;
    if (obj&&typeof obj==='object') {
      const v=obj[name];
      if (v!==undefined) return typeof v==='number'&&!v._native ? v : v; // handle math.pi etc
      return null;
    }
    return null;
  }

  async evalIndex(node) {
    const obj=await this.evalNode(node.obj);
    const idx=await this.evalNode(node.index);
    if (Array.isArray(obj)) {
      const i=typeof idx==='number'?(idx<0?obj.length+idx:idx):parseInt(idx);
      if (i<0||i>=obj.length) throw new QError(`IndexError: index ${idx} out of range (length ${obj.length})`);
      return obj[i]??null;
    }
    if (typeof obj==='string') {
      const i=typeof idx==='number'?(idx<0?obj.length+idx:idx):parseInt(idx);
      return obj[i]??null;
    }
    if (obj&&obj._dict) return obj._dict[String(idx)]??null;
    throw new QError(`TypeError: Cannot index ${typeof obj}`);
  }

  async evalSlice(node) {
    const obj=await this.evalNode(node.obj);
    const arr=Array.isArray(obj)?obj:typeof obj==='string'?[...obj]:[];
    const len=arr.length;
    let start=node.start?await this.evalNode(node.start):0;
    let stop =node.stop ?await this.evalNode(node.stop) :len;
    let step =node.step ?await this.evalNode(node.step) :1;
    if (start<0) start=Math.max(0,len+start);
    if (stop <0) stop =Math.max(0,len+stop);
    start=Math.min(Math.max(0,start),len);
    stop =Math.min(Math.max(0,stop),len);
    const r=[];
    if (step>0) { for(let i=start;i<stop;i+=step) r.push(arr[i]); }
    else        { for(let i=start;i>stop;i+=step) r.push(arr[i]); }
    return typeof obj==='string'?r.join(''):r;
  }

  async evalListComp(node) {
    const iterVal=await this.evalNode(node.iter);
    const items=Array.isArray(iterVal)?iterVal:(iterVal&&iterVal._dict)?Object.entries(iterVal._dict).map(([k,v])=>[k,v]):[];
    const result=[];
    for (const item of items) {
      this.step();
      const env=new Environment(this.env);
      if (node.vars.length===1) env.define(node.vars[0],item);
      else if (node.vars.length>=2&&Array.isArray(item)) { for(let i=0;i<node.vars.length;i++) env.define(node.vars[i],item[i]??null); }
      else env.define(node.vars[0],item);
      const prev=this.env; this.env=env;
      try {
        const ok=!node.cond||this.isTruthy(await this.evalNode(node.cond));
        if (ok) result.push(await this.evalNode(node.expr));
      } finally { this.env=prev; }
    }
    return result;
  }

  async evalPostIncDec(node) {
    const cur=await this.evalNode(node.operand);
    const newVal=node.op==='++'?(cur??0)+1:(cur??0)-1;
    await this.setLValue(node.operand,newVal,'=');
    return cur; // return OLD value (post-increment)
  }

  async evalAddrOf(node) {
    const val=await this.evalNode(node.operand);
    const cell={val};
    const addr='0x'+Math.floor(0x7ffe00000000+Math.random()*0xFFFF).toString(16).toUpperCase();
    return {_ptr:true, _cell:cell, _name:node.operand?.name||'?', _addr:addr};
  }

  async evalDeref(node) {
    const ptr=await this.evalNode(node.operand);
    if (ptr===null||ptr===undefined) throw new QError('RuntimeError: Null pointer dereference');
    if (ptr._ptr) return ptr._cell.val;
    throw new QError('RuntimeError: Cannot dereference non-pointer');
  }

  async evalArrow(node) {
    const ptr=await this.evalNode(node.obj);
    if (ptr===null||ptr===undefined) throw new QError('RuntimeError: Null pointer dereference');
    const obj=ptr._ptr?ptr._cell.val:ptr;
    if (obj&&obj._inst) return obj._inst[node.name]??null;
    if (obj&&typeof obj==='object') return obj[node.name]??null;
    throw new QError(`TypeError: Cannot use -> on ${typeof obj}`);
  }

  async evalNew(node) {
    try {
      const klass=this.env.get(node.cls);
      const args=[]; for(const a of node.args) args.push(await this.evalNode(a));
      return await this.instantiate(klass,args);
    } catch(e) {
      if (e instanceof QError) throw e;
      throw new QError(`NameError: class '${node.cls}' not found`);
    }
  }

  async evalSuper(node) {
    const self=this.env.has('self')?this.env.get('self'):null;
    if (!self||!self._class) throw new QError('RuntimeError: super() outside class');
    const base=self._class.base;
    if (!base) throw new QError('RuntimeError: class has no base class');
    const initFn=this.findMethod(base,'init')||this.findMethod(base,'__init__');
    if (!initFn) return null;
    const args=[]; for(const a of node.args) args.push(await this.evalNode(a));
    return await this.callFn(initFn,args,self);
  }
}

// ══════════════════════════════════════════════════════════════════
//  SYNTAX HIGHLIGHTER
// ══════════════════════════════════════════════════════════════════
function highlight(code) {
  return code.split('\n').map(highlightLine).join('\n');
}

function highlightLine(line) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let result='', i=0;

  while (i<line.length) {
    // Comment
    if (line[i]==='#' || (line[i]==='/' && line[i+1]==='/')) {
      result+=`<span class="hl-cm">${esc(line.slice(i))}</span>`; break;
    }
    // String
    if (line[i]==='"' || line[i]==="'") {
      const q=line[i]; let s=q, j=i+1;
      while (j<line.length && line[j]!==q) {
        if (line[j]==='\\') { s+=esc(line[j]); j++; s+=esc(line[j]||''); j++; }
        else s+=esc(line[j++]);
      }
      s+=q; j++;
      result+=`<span class="hl-str">${s}</span>`; i=j; continue;
    }
    // Template literal
    if (line[i]==='`') {
      let s='`', j=i+1;
      while (j<line.length && line[j]!=='`') s+=esc(line[j++]);
      s+='`'; j++;
      result+=`<span class="hl-str">${s}</span>`; i=j; continue;
    }
    // Number
    if (/[0-9]/.test(line[i]) || (line[i]==='.' && /[0-9]/.test(line[i+1]||''))) {
      let n='', j=i;
      if (line[j]==='0' && (line[j+1]==='x'||line[j+1]==='X')) {
        n+=line[j++]; n+=line[j++]; while(j<line.length&&/[0-9a-fA-F]/.test(line[j]))n+=line[j++];
      } else { while(j<line.length&&(/[0-9.]/.test(line[j])))n+=line[j++]; }
      result+=`<span class="hl-num">${esc(n)}</span>`; i=j; continue;
    }
    // Identifier/keyword
    if (/[a-zA-Z_$]/.test(line[i])) {
      let id='', j=i;
      while (j<line.length && /[a-zA-Z0-9_$]/.test(line[j])) id+=line[j++];
      const isSelf  = id==='self'||id==='this';
      const isType  = TYPE_KW.has(id);
      const isKw    = KEYWORDS.has(id)&&!isSelf&&!isType;
      const isFnRef = !isKw&&!isSelf&&!isType&&j<line.length&&line[j]==='(';
      const cls = isSelf?'hl-self':isType?'hl-type':isKw?'hl-kw':isFnRef?'hl-fn':'hl-id';
      result+=`<span class="${cls}">${esc(id)}</span>`; i=j; continue;
    }
    // Operator
    if ('=+-*/%<>!&|^~'.includes(line[i])) {
      result+=`<span class="hl-op">${esc(line[i])}</span>`; i++; continue;
    }
    result+=esc(line[i]); i++;
  }
  return result;
}

function initFiles() {
  files['main.sa'] = EXAMPLES[0].items[0].code;
  loadFile('main.sa');
  renderFileList();
  renderExamples();
}

function renderFileList() {
  const list = document.getElementById('fileList');
  list.innerHTML = '';
  for (const name in files) {
    const el=document.createElement('div');
    el.className='file-item'+(name===activeFile?' active':'');
    el.innerHTML=`<span class="file-icon">◈</span><span class="file-name">${name}</span>`;
    el.onclick=()=>loadFile(name);
    list.appendChild(el);
  }
}

function loadFile(name) {
  if (activeFile && activeFile!==name) files[activeFile]=document.getElementById('codeInput').value;
  activeFile=name;
  document.getElementById('codeInput').value=files[name]||'';
  updateHighlight();
  updateLineNumbers();
  renderFileList();
  renderTabs();
}

function renderTabs() {
  const bar=document.getElementById('tabBar');
  bar.innerHTML='';
  for (const name in files) {
    const el=document.createElement('div');
    el.className='editor-tab'+(name===activeFile?' active':'');
    el.innerHTML=`<span class="dot"></span>${name}<button class="tab-close" onclick="closeFile(event,'${name}')">×</button>`;
    el.onclick=(e)=>{ if(!e.target.classList.contains('tab-close'))loadFile(name); };
    bar.appendChild(el);
  }
}

function closeFile(e, name) {
  e.stopPropagation();
  delete files[name];
  if (activeFile===name) {
    const rem=Object.keys(files);
    activeFile=rem.length?rem[0]:null;
    if (activeFile) document.getElementById('codeInput').value=files[activeFile]||'';
  }
  renderFileList(); renderTabs();
  if (!activeFile) { document.getElementById('codeInput').value=''; updateHighlight(); updateLineNumbers(); }
}

function newFile() {
  let n=1;
  while(files['untitled'+n+'.sa'])n++;
  const name='untitled'+n+'.sa';
  files[name]='# New Quantum file\n';
  loadFile(name);
}

function loadExample(code, name) {
  files[name]=code;
  loadFile(name);
  switchOutTab(document.querySelector('[data-panel="output"]'),'output');
}

function renderExamples() {
  const panel=document.getElementById('exPanel');
  panel.innerHTML='';
  for (const group of EXAMPLES) {
    const g=document.createElement('div');
    g.className='ex-group';
    g.innerHTML=`<div class="ex-group-title">${group.group}</div>`;
    for (const item of group.items) {
      const el=document.createElement('div');
      el.className='ex-item';
      el.innerHTML=`<span class="ex-name">${item.name}</span><span class="ex-desc">${item.desc}</span>`;
      el.onclick=()=>loadExample(item.code,item.name);
      g.appendChild(el);
    }
    panel.appendChild(g);
  }
}

const codeInput=document.getElementById('codeInput');
const hlLayer=document.getElementById('highlightLayer');
const lineNums=document.getElementById('lineNumbers');
let syncTimeout=null;

codeInput.addEventListener('input', () => {
  clearTimeout(syncTimeout);
  syncTimeout=setTimeout(updateHighlight,60);
  updateLineNumbers();
  if (activeFile) files[activeFile]=codeInput.value;
});

codeInput.addEventListener('scroll', () => {
  hlLayer.scrollTop=codeInput.scrollTop;
  hlLayer.scrollLeft=codeInput.scrollLeft;
  lineNums.scrollTop=codeInput.scrollTop;
});

codeInput.addEventListener('keydown', e => {
  if (e.key==='Tab') {
    e.preventDefault();
    const s=codeInput.selectionStart, end=codeInput.selectionEnd;
    codeInput.value=codeInput.value.substring(0,s)+'    '+codeInput.value.substring(end);
    codeInput.selectionStart=codeInput.selectionEnd=s+4;
    updateHighlight(); updateLineNumbers();
  }
  if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') { e.preventDefault(); runCode(); }
  if ((e.ctrlKey||e.metaKey)&&e.key==='s') { e.preventDefault(); toast('✓ Saved'); }
});

function updateHighlight() {
  hlLayer.innerHTML = highlight(codeInput.value);
}

function updateLineNumbers() {
  const n = codeInput.value.split('\n').length;
  lineNums.innerHTML = Array.from({length:n},(_,i)=>`<span>${i+1}</span>`).join('');
}

// ══════════════════════════════════════════════════════════════════
//  RUNNER
// ══════════════════════════════════════════════════════════════════
let pendingInputResolve=null;

function appendOutput(text, cls='stdout') {
  const out=document.getElementById('output');
  const line=document.createElement('span');
  line.className='out-line '+cls;
  line.textContent=text;
  out.appendChild(line);
  out.appendChild(document.createTextNode('\n'));
  out.scrollTop=out.scrollHeight;
}

function clearOutput() {
  document.getElementById('output').innerHTML='';
  document.getElementById('execTime').textContent='';
}

async function runCode() {
  if (activeFile) files[activeFile]=codeInput.value;
  const code=codeInput.value.trim();
  if (!code) { toast('No code to run'); return; }

  clearOutput();
  appendOutput(`▶ Running ${activeFile||'untitled.sa'}...`, 'info');
  appendOutput('─'.repeat(40), 'sep');

  // Update status indicator
  const dot=document.querySelector('.status-dot');
  const statusTxt=document.querySelector('.nav-status span:last-child');
  dot.style.background='var(--yellow)'; dot.style.boxShadow='0 0 6px var(--yellow)';
  statusTxt.textContent='running...';

  const inputFn = async (prompt) => {
    if (prompt) appendOutput((prompt), 'prompt');
    document.getElementById('inputRow').style.display='flex';
    document.getElementById('stdinInput').focus();
    const val=await new Promise(res=>{ pendingInputResolve=res; });
    document.getElementById('inputRow').style.display='none';
    appendOutput('› '+val, 'info');
    return val;
  };

  const t0=performance.now();
  const interp=new Interpreter(appendOutput, inputFn);

  try {
    const tokens=tokenize(code);
    const ast=new Parser(tokens).parse();
    await interp.execNode(ast);
    const elapsed=((performance.now()-t0)/1000).toFixed(3);
    appendOutput('─'.repeat(40), 'sep');
    appendOutput(`✓ Done in ${elapsed}s`, 'success');
    document.getElementById('execTime').textContent=elapsed+'s';
    dot.style.background='var(--green)'; dot.style.boxShadow='0 0 6px var(--green)';
    statusTxt.textContent='interpreter ready';
  } catch(e) {
    const elapsed=((performance.now()-t0)/1000).toFixed(3);
    appendOutput('─'.repeat(40), 'sep');
    appendOutput('✗ '+e.message, 'stderr');
    document.getElementById('execTime').textContent='error';
    document.getElementById('inputRow').style.display='none';
    dot.style.background='var(--red)'; dot.style.boxShadow='0 0 6px var(--red)';
    statusTxt.textContent='error';
    setTimeout(()=>{ dot.style.background='var(--green)'; dot.style.boxShadow='0 0 6px var(--green)'; statusTxt.textContent='interpreter ready'; }, 3000);
  }
}

function sendStdin() {
  const input=document.getElementById('stdinInput');
  const val=input.value; input.value='';
  if (pendingInputResolve) { pendingInputResolve(val); pendingInputResolve=null; }
}
document.getElementById('stdinInput').addEventListener('keydown', e => {
  if (e.key==='Enter') { e.preventDefault(); sendStdin(); }
});

function formatCode() { toast('Format: trust your indentation (it looked fine to us)'); }

// ══════════════════════════════════════════════════════════════════
//  UI
// ══════════════════════════════════════════════════════════════════
function switchOutTab(btn, panel) {
  document.querySelectorAll('.out-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.output-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panel).classList.add('active');
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// Resizer
const resizer=document.getElementById('resizer');
const rightPane=document.getElementById('rightPane');
let isResizing=false;
resizer.addEventListener('mousedown', e => { isResizing=true; resizer.classList.add('dragging'); e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const rect=document.getElementById('ideShell').getBoundingClientRect();
  const w=rect.right-e.clientX;
  if (w>180&&w<800) rightPane.style.width=w+'px';
});
document.addEventListener('mouseup', () => { isResizing=false; resizer.classList.remove('dragging'); });

// INIT
initFiles();
updateHighlight();
updateLineNumbers();
